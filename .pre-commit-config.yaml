repos:
  - repo: local
    hooks:
      - id: pre-commit
        name: pre-commit
        entry: task pre-commit
        language: system
        stages: [pre-commit]
        pass_filenames: false
        always_run: true

      - id: pre-push
        name: pre-push
        entry: task pre-push
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true
