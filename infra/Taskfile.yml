# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

method: timestamp # do not checksum files, just compare timestamps for status

tasks:
  # ── Terraform ────────────────────────────────────────────────────────────────

  init:
    desc: Initialize Terraform
    cmds:
      - terraform init
    sources:
      - ./**/*.tf
    generates:
      - .terraform
      - .terraform.lock.hcl

  plan:
    desc: Preview changes without applying
    cmds:
      - terraform plan -var-file=terraform.tfvars

  apply:
    desc: Apply infrastructure changes
    cmds:
      - terraform apply -var-file=terraform.tfvars
    sources:
      - ./**/*.tf
      - ./**/*.tfvars

  destroy:
    desc: Destroy all managed infrastructure
    cmds:
      - terraform destroy -var-file=terraform.tfvars

  format:
    desc: Format all Terraform files
    cmds:
      - terraform fmt -recursive
    sources:
      - ./**/*.tf

  lint:
    desc: Validate Terraform configuration
    cmds:
      - terraform validate
    sources:
      - ./**/*.tf
      - ./**/*.tfvars

  setup:
    desc: Copy example vars and initialize Terraform
    cmds:
      - cp -n terraform.tfvars.example terraform.tfvars
      - task: init
    status:
      - test -f terraform.tfvars
      - test -d .terraform

  # ── Docker / Deploy ───────────────────────────────────────────────────────────

  # Internal: receives TF_OUT (JSON string), TAG, SERVICE_KEY (backend|frontend), CONTEXT.
  # Optional: BUILD_ARGS for extra docker build flags (e.g. --build-arg VITE_API_URL=...).
  _deploy:
    internal: true
    vars:
      REGION:
        sh: echo '{{.TF_OUT}}' | jq -r .region.value
      PROJECT:
        sh: echo '{{.TF_OUT}}' | jq -r .project_id.value
      IMAGE:
        sh: echo '{{.TF_OUT}}' | jq -r .{{.SERVICE_KEY}}_image.value
      SERVICE:
        sh: echo '{{.TF_OUT}}' | jq -r .{{.SERVICE_KEY}}_service.value
    cmds:
      - docker build --platform linux/amd64 {{.BUILD_ARGS}} -t {{.IMAGE}}:{{.TAG}} {{.CONTEXT}}
      - docker push {{.IMAGE}}:{{.TAG}}
      - >
        gcloud run deploy {{.SERVICE}}
        --image {{.IMAGE}}:{{.TAG}}
        --region {{.REGION}}
        --project {{.PROJECT}}
    sources:
      - "{{.CONTEXT}}/**/*"

  docker-auth:
    desc: Authenticate Docker with Artifact Registry
    vars:
      TF_OUT:
        sh: terraform output -json
      REGION:
        sh: echo '{{.TF_OUT}}' | jq -r .region.value
      PROJECT:
        sh: echo '{{.TF_OUT}}' | jq -r .project_id.value
    cmds:
      - gcloud auth configure-docker {{.REGION}}-docker.pkg.dev --project {{.PROJECT}}
    sources:
      - main.tf
      - terraform.tfvars
    generates:
      - ~/.docker/config.json

  deploy-backend:
    desc: Build, push, and deploy the backend image (tag = git short SHA)
    vars:
      TAG:
        sh: git rev-parse --short HEAD
      TF_OUT:
        sh: terraform output -json
    cmds:
      - task: _deploy
        vars:
          TF_OUT: "{{.TF_OUT}}"
          TAG: "{{.TAG}}"
          SERVICE_KEY: backend
          CONTEXT: ../backend
    sources:
      - ../backend/**/*

  deploy-frontend:
    desc: Build, push, and deploy the frontend image (tag = git short SHA)
    vars:
      TAG:
        sh: git rev-parse --short HEAD
      TF_OUT:
        sh: terraform output -json
      BACKEND_URL:
        sh: echo '{{.TF_OUT}}' | jq -r .backend_url.value
    cmds:
      - task: _deploy
        vars:
          TF_OUT: "{{.TF_OUT}}"
          TAG: "{{.TAG}}"
          SERVICE_KEY: frontend
          CONTEXT: ../frontend
          BUILD_ARGS: "--build-arg VITE_API_URL={{.BACKEND_URL}}"
    sources:
      - ../frontend/**/*

  # Meta-task: reads TF outputs once, deploys both services
  deploy:
    desc: Build and deploy both backend and frontend
    vars:
      TAG:
        sh: git rev-parse --short HEAD
      TF_OUT:
        sh: terraform output -json
      BACKEND_URL:
        sh: echo '{{.TF_OUT}}' | jq -r .backend_url.value
    cmds:
      - task: _deploy
        vars:
          TF_OUT: "{{.TF_OUT}}"
          TAG: "{{.TAG}}"
          SERVICE_KEY: backend
          CONTEXT: ../backend
      - task: _deploy
        vars:
          TF_OUT: "{{.TF_OUT}}"
          TAG: "{{.TAG}}"
          SERVICE_KEY: frontend
          CONTEXT: ../frontend
          BUILD_ARGS: "--build-arg VITE_API_URL={{.BACKEND_URL}}"
    sources:
      - ../backend/**/*
      - ../frontend/**/*
