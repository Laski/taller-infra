services:
  db:
    image: postgres:18.3
    environment:
      POSTGRES_USER: ${DB_USER:-mentyx}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mentyx}
      POSTGRES_DB: ${DB_NAME:-mentyx}
    ports:
      - "5432:5432"
    volumes:
      # postgres 18+ expects the mount at /var/lib/postgresql (not /data)
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      start_period: 10s
      start_interval: 1s
      interval: 30s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-mentyx}:${DB_PASSWORD:-mentyx}@db:5432/${DB_NAME:-mentyx}
      PORT: "8000"
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:$$PORT/health')",
        ]
      start_period: 30s
      start_interval: 1s
      interval: 30s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
