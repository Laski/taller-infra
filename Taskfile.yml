# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

method: timestamp # do not checksum files, just compare timestamps for status

includes:
  backend:
    taskfile: ./backend/Taskfile.yml
    dir: ./backend
  frontend:
    taskfile: ./frontend/Taskfile.yml
    dir: ./frontend

tasks:
  init:
    desc: Set up the project for first use (env files)
    cmds:
      - cp -n backend/.env.example backend/.env
      - cp -n frontend/.env.example frontend/.env
      - command -v uv || brew install uv
      - command -v pnpm || npm install -g pnpm
      - cd backend && uv sync
    status:
      - test -f backend/.env
      - test -f frontend/.env

  pre-commit:
    desc: Git pre-commit checks
    cmds:
      - task: lint
      - task: typecheck
      - task: format

  pre-push:
    desc: Git pre-push checks
    cmds:
      - task: test

  sync:
    desc: Install all dependencies for both frontend and backend
    aliases: [deps]
    cmds:
      - task: backend:sync
      - task: frontend:sync

  format-prettier:
    desc: Format all files with prettier (including this Taskfile)
    cmds:
      - frontend/node_modules/.bin/prettier --write --log-level warn .
    sources:
      - ./**/*.{ts,tsx,js,jsx,json,md,html,css,scss,yml,yaml}

  format:
    desc: Format all projects
    cmds:
      - task: backend:format
      - task: frontend:format
      - task: format-prettier

  lint:
    desc: Lint all projects
    cmds:
      - task: backend:lint
      - task: frontend:lint

  typecheck:
    desc: Run type checks for all projects
    cmds:
      - task: backend:typecheck
      - task: frontend:typecheck

  up:
    desc: Build and start the full stack
    cmds:
      - docker compose up --build

  test:
    desc: Run backend tests both with and without postgres
    cmds:
      - task: backend:test
      - task: backend:test-postgres
