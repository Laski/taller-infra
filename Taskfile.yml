# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

includes:
  backend:
    taskfile: ./backend/Taskfile.yml
    dir: ./backend
  frontend:
    taskfile: ./frontend/Taskfile.yml
    dir: ./frontend

tasks:
  init:
    desc: Set up the project for first use (env files)
    cmds:
      - cp -n backend/.env.example backend/.env
      - cp -n frontend/.env.example frontend/.env
      - command -v uv || brew install uv
      - command -v pnpm || npm install -g pnpm
      - cd backend && uv sync
    status:
      - test -f backend/.env
      - test -f frontend/.env

  pre-commit:
    desc: Git pre-commit checks
    cmds:
      - task: format
      - task: backend:lint
      #- task: frontend:lint
      - task: frontend:typecheck

  pre-push:
    desc: Git pre-push checks
    cmds:
      - task: test

  sync:
    desc: Install all dependencies for both frontend and backend
    aliases: [deps]
    cmds:
      - cd backend && uv sync
      - cd frontend && pnpm install

  format-prettier:
    desc: Format all files with prettier
    cmds:
      - pnpm dlx prettier --write --log-level silent .

  format:
    desc: Format all files
    cmds:
      - task: backend:format
      - task: frontend:format

  up:
    desc: Build and start the full stack
    cmds:
      - docker compose up --build

  test:
    desc: Run backend tests both with and without postgres
    cmds:
      - task: backend:test
      - task: backend:test-postgres
